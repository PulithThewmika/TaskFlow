spring:
  application:
    name: taskflow-backend

  datasource:
    url: jdbc:mysql://localhost:3306/taskflow_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect

server:
  port: 8081

jwt:
  secret: TaskFlowSecretKeyForJWTTokenGeneration2024SuperSecure
  expiration: 86400000  # 24 hours in milliseconds
