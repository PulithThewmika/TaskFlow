name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Build with Maven
      working-directory: ./taskflow-backend
      run: mvn clean package -DskipTests
      env:
        # Note: The project currently uses MySQL + Spring Data JPA.
        # If you are passing a MongoDB URI, you will need to replace the JPA repository with Spring Data MongoDB.
        # Below is an example of passing the GitHub Secret to application configuration.
        SPRING_DATASOURCE_URL: ${{ secrets.MONGO_URI }}
        
    - name: Azure Login
      uses: azure/login@v2
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}

    - name: Configure Azure Web App Settings (MONGO_URI)
      uses: azure/appservice-settings@v1
      with:
        app-name: 'YOUR_AZURE_WEBAPP_NAME' # Replace with your Azure App Service name
        app-settings-json: |
          [
            {
              "name": "SPRING_DATASOURCE_URL",
              "value": "${{ secrets.MONGO_URI }}"
            }
          ]

    - name: Deploy to Azure Web App
      uses: azure/webapps-deploy@v2
      with:
        app-name: 'YOUR_AZURE_WEBAPP_NAME' # Replace with your Azure App Service name
        package: './taskflow-backend/target/*.jar'
