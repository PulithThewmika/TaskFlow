name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  id-token: write
  contents: read

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Build Backend with Maven
      working-directory: ./taskflow-backend
      run: mvn clean package -DskipTests
      env:
        SPRING_DATASOURCE_URL: ${{ secrets.MONGO_URI }}

    - name: Run Backend Tests
      working-directory: ./taskflow-backend
      run: mvn test -Dspring.profiles.active=test

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install Frontend Dependencies
      working-directory: ./taskflow-frontend
      run: npm ci --legacy-peer-deps || npm install

    - name: Build Frontend
      working-directory: ./taskflow-frontend
      run: npm run build

    - name: Upload Backend Artifact
      uses: actions/upload-artifact@v4
      with:
        name: backend-jar
        path: ./taskflow-backend/target/*.jar

  deploy:
    name: Deploy to Azure
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
    - uses: actions/checkout@v4

    - name: Download Backend Artifact
      uses: actions/download-artifact@v4
      with:
        name: backend-jar
        path: ./deploy

    - name: Azure Login (OIDC)
      uses: azure/login@v2
      with:
        client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_E299B6F27C834D789D4E3BA1E95FA8EC }}
        tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_1D595BF32F304450AF5C0107E6EFE5D0 }}
        subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_04F80C47DDCE43A4BFA34E2E7E716CC5 }}

    - name: Deploy to Azure Web App
      uses: azure/webapps-deploy@v3
      with:
        app-name: 'TaskFlow-backend'  
        package: ./deploy/*.jar
