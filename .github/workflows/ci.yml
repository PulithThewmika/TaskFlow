name: CI/CD Pipeline

on:
  push:
    branches: [ "main"]
  pull_request:
    branches: [ "main", "QA" ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  id-token: write
  contents: read
  checks: write        # needed for test-reporter to publish results

jobs:
  # ─────────────────────────────────────────────────────────────────────────
  # JOB 1 — Backend: compile, unit + integration tests, package
  # ─────────────────────────────────────────────────────────────────────────
  backend-test:
    name: Backend — Build & Test (JUnit 5)
    runs-on: ubuntu-latest

    steps:
    - name: Checkout source
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven          # cache ~/.m2 to speed up subsequent runs

    # ── Compile only (fast fail before tests) ──────────────────────────────
    - name: Compile backend
      working-directory: ./taskflow-backend
      run: mvn clean compile -q

    # ── Run all 37 JUnit 5 tests with the "test" Spring profile ────────────
    # Flapdoodle auto-starts an embedded MongoDB, so no external DB needed.
    # JWT_SECRET is provided via env so @Value("${jwt.secret}") resolves.
    - name: Run JUnit 5 tests
      working-directory: ./taskflow-backend
      run: mvn test -Dspring.profiles.active=test -Dde.flapdoodle.os.override=Linux\|X86_64\|Ubuntu\|Ubuntu_22_04

    # ── Package the JAR (skip tests — already ran above) ──────────────────
    - name: Package backend JAR
      working-directory: ./taskflow-backend
      run: mvn package -DskipTests -q
      env:
        MONGO_URI: ${{ secrets.MONGO_URI }}

    # ── Publish Surefire XML test results to the GitHub Actions UI ─────────
    - name: Publish Test Results
      uses: mikepenz/action-junit-report@v4
      if: always()           # run even if tests fail, so we can see the report
      with:
        report_paths: './taskflow-backend/target/surefire-reports/TEST-*.xml'
        check_name: 'JUnit 5 Test Report'
        fail_on_failure: true

    # ── Upload the JAR as a build artifact ────────────────────────────────
    - name: Upload backend JAR artifact
      uses: actions/upload-artifact@v4
      if: success()
      with:
        name: backend-jar
        path: ./taskflow-backend/target/*.jar
        retention-days: 7

  # ─────────────────────────────────────────────────────────────────────────
  # JOB 2 — Frontend: install & build
  # ─────────────────────────────────────────────────────────────────────────
  frontend-build:
    name: Frontend — Install & Build
    runs-on: ubuntu-latest

    steps:
    - name: Checkout source
      uses: actions/checkout@v4

    - name: Setup Node.js 20
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: ./taskflow-frontend/package-lock.json

    - name: Install frontend dependencies
      working-directory: ./taskflow-frontend
      run: npm ci --legacy-peer-deps || npm install

    - name: Build frontend
      working-directory: ./taskflow-frontend
      run: npm run build

  # ─────────────────────────────────────────────────────────────────────────
  # JOB 3 — Deploy to Azure (only on push to main)
  # ─────────────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to Azure
    needs: [ backend-test, frontend-build ]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
    - uses: actions/checkout@v4

    - name: Download backend JAR
      uses: actions/download-artifact@v4
      with:
        name: backend-jar
        path: ./deploy

    - name: Azure Login (OIDC)
      uses: azure/login@v2
      with:
        client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_E299B6F27C834D789D4E3BA1E95FA8EC }}
        tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_1D595BF32F304450AF5C0107E6EFE5D0 }}
        subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_04F80C47DDCE43A4BFA34E2E7E716CC5 }}

    - name: Update Azure App Settings
      uses: azure/appservice-settings@v1
      with:
        app-name: 'TaskFlow-backend'
        app-settings-json: |
          [
            {
              "name": "MONGO_URI",
              "value": "${{ secrets.MONGO_URI }}",
              "slotSetting": false
            },
            {
              "name": "JWT_SECRET",
              "value": "${{ secrets.JWT_SECRET }}",
              "slotSetting": false
            }
          ]

    - name: Deploy to Azure Web App
      uses: azure/webapps-deploy@v3
      with:
        app-name: 'TaskFlow-backend'
        package: ./deploy
