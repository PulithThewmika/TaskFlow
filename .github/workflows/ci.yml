name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Build with Maven
      working-directory: ./taskflow-backend
      run: mvn clean package -DskipTests
      env:
        # Note: The project currently uses MySQL + Spring Data JPA.
        # If you are passing a MongoDB URI, you will need to replace the JPA repository with Spring Data MongoDB.
        # Below is an example of passing the GitHub Secret to application configuration.
        SPRING_DATASOURCE_URL: ${{ secrets.MONGO_URI }}
        
    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'

    - name: Build Frontend
      working-directory: ./taskflow-frontend
      run: |
        npm install
        npm run build
