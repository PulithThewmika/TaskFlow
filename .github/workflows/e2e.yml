name: E2E Tests

on:
  push:
    branches: [main]
  workflow_dispatch: # Manual trigger button in GitHub Actions UI

jobs:
  playwright:
    name: Playwright E2E
    runs-on: ubuntu-latest
    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          
      - name: Start Backend
        working-directory: ./taskflow-backend
        run: mvn spring-boot:run -Dspring-boot.run.profiles=dev &
        env:
          MONGO_URI: mongodb://localhost:27017/taskflow_e2e_db
          JWT_SECRET: "your_super_secret_key_that_is_long_enough_for_hs256"
          
      - name: Wait for Backend
        run: |
          for i in $(seq 1 30); do
            curl -s http://localhost:8080/api/health && break
            sleep 2
          done
          
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Install Frontend
        working-directory: ./taskflow-frontend
        run: npm ci --legacy-peer-deps || npm install
        
      - name: Install Playwright Browsers
        working-directory: ./taskflow-frontend
        run: npx playwright install --with-deps chromium
        
      - name: Start Frontend
        working-directory: ./taskflow-frontend
        run: npm run dev &
        
      - name: Wait for Frontend
        run: |
          timeout 60 bash -c 'while ! curl -s http://localhost:5173 > /dev/null; do sleep 2; done' || false
        
      - name: Run Playwright Tests
        working-directory: ./taskflow-frontend
        run: npx playwright test --reporter=html
        
      - name: Upload Test Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: ./taskflow-frontend/playwright-report/
