name: E2E Tests

on:
  push:
    branches: [main]
  workflow_dispatch: # Manual trigger button in GitHub Actions UI

jobs:
  playwright:
    name: Playwright E2E
    runs-on: ubuntu-latest
    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Install Frontend
        working-directory: ./taskflow-frontend
        run: npm ci --legacy-peer-deps || npm install
        
      - name: Install Playwright Browsers
        working-directory: ./taskflow-frontend
        run: npx playwright install --with-deps chromium
          
      - name: Run E2E Tests (Backend + Frontend + Playwright)
        env:
          MONGO_URI: mongodb://localhost:27017/taskflow_e2e_db
          JWT_SECRET: "your_super_secret_key_that_is_long_enough_for_hs256"
          CI: true
        run: |
          # 1. Start Backend
          cd taskflow-backend
          mvn spring-boot:run -Dspring-boot.run.profiles=dev &
          BACKEND_PID=$!
          cd ..
          
          # Wait for Backend Health
          echo "Waiting for backend..."
          timeout 60 bash -c 'while [[ "$(curl -s -o /dev/null -w ''%{http_code}'' localhost:8080/api/health)" != "200" ]]; do sleep 2; done' || (echo "Backend failed to start"; exit 1)
          
          # 2. Start Frontend
          cd taskflow-frontend
          npm run dev &
          FRONTEND_PID=$!
          
          # Wait for Frontend
          echo "Waiting for frontend..."
          timeout 60 bash -c 'while ! curl -s http://localhost:5173 > /dev/null; do sleep 2; done' || (echo "Frontend failed to start"; exit 1)
          
          # 3. Run Playwright Tests
          echo "Running Playwright tests..."
          npx playwright test --reporter=html
          TEST_EXIT_CODE=$?
          
          # Cleanup
          kill $FRONTEND_PID
          kill $BACKEND_PID
          
          exit $TEST_EXIT_CODE
          
      - name: Upload Test Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: ./taskflow-frontend/playwright-report/
